services:
  flask:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: think_tank_api
    command: gunicorn -b 0.0.0.0:6000 -w 1 --threads 8 --timeout 300 --preload app:app
    ports:
      - "6000:6000"
    volumes:
      - /home/ardi/Projects/think_tank/notes.db:/app/notes.db
      - /home/ardi/Projects/think_tank/uploads:/app/uploads
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: think_tank_ollama
    profiles: [ollama]
    # Not exposed to host — only the flask container talks to it on the internal network.
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: think_tank_frontend
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - API_URL=http://flask:6000
      - COOKIE_SECRET=${COOKIE_SECRET}
    depends_on:
      - flask
    restart: always

volumes:
  ollama_data:
